packages:
  - "packages/*"
  - "apps/*"
  - "tests"

# esbuild fetches its platform binary in a postinstall; the others are optional native
# perf addons that safely fall back to pure JS when their build script is skipped.
allowBuilds:
  esbuild: true
  bigint-buffer: false
  bufferutil: false
  utf-8-validate: false
  sharp: false
  workerd: true

minimumReleaseAgeExclude:
  - "@types/node@26.0.1"
  - '@cloudflare/workers-types@4.20260625.1'
